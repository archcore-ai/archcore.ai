    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do I need both the plugin and the CLI?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The plugin uses the CLI under the hood, so installing the plugin gives you both. If you only want the core context layer — .archcore/, MCP, hooks — install the CLI on its own."
            }
          },
          {
            "@type": "Question",
            "name": "Which path should I start with — Plugin or CLI + MCP?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Start with the Plugin if you use Claude Code or Cursor and want the best day-to-day experience. Start with CLI + MCP if you want the core directly — for custom agent flows, minimal setups, or agents that the plugin does not yet support."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI agents are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Plugin hosts: Claude Code (production) and Cursor (implemented). Copilot and Codex CLI are on the plugin roadmap. CLI + MCP + hooks works with 8 agents today: Claude Code, Cursor, Gemini CLI, GitHub Copilot, OpenCode, Codex CLI, Roo Code, Cline."
            }
          },
          {
            "@type": "Question",
            "name": "What does archcore init create?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Creates .archcore/ with 18 document types in three layers: Vision (PRD, Idea, Plan, MRD, BRD, URD, BRS, StRS, SyRS, SRS), Knowledge (ADR, RFC, Rule, Guide, Doc, Spec), Experience (Task Type, CPAT). Each is markdown with YAML frontmatter, versioned with your code."
            }
          },
          {
            "@type": "Question",
            "name": "How do hooks and MCP work together?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hooks inject context at session start automatically. MCP exposes tools (list, get, create, update) so agents can browse and edit .archcore/ documents during a session. Set up with archcore hooks install and archcore mcp install."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need any external services?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Standalone CLI binary. Everything in .archcore/ inside your repo — no servers, databases, accounts, or external dependencies. Install with curl -fsSL https://archcore.ai/install.sh | bash or go install."
            }
          },
          {
            "@type": "Question",
            "name": "How is this different from CLAUDE.md or AGENTS.md?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Instruction files are flat, tool-specific, and weakly structured. Archcore gives you multiple document types, relations between them, versioned history, and reads and writes during real work — reusable across Claude Code, Cursor, Copilot, and other agents."
            }
          },
          {
            "@type": "Question",
            "name": "How do I keep the CLI updated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "archcore update self-updates to the latest version. Cross-platform (macOS, Linux, Windows) on amd64/arm64. Run archcore doctor anytime to verify setup and check for issues."
            }
          }
        ]
      }
    </script>

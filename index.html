        "name": "Archcore",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Linux, macOS, Windows (Docker)",
        "url": "https://archcore.ai",

        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What does archcore init create?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Creates .archcore/ directory with 10 document types in three layers: Vision (PRD, Idea, Plan), Knowledge (ADR, RFC, Rule, Guide, Doc), Experience (Task Type, CPAT). Each is markdown with YAML frontmatter. Version-controlled with your code."
            }
          },
          {
            "@type": "Question",
            "name": "Which AI agents does it support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "8 agents: Claude Code, Cursor, Gemini CLI, GitHub Copilot, OpenCode, Codex CLI, Roo Code, Cline. Hooks (session start injection) for Claude Code/Cursor/Gemini CLI/GitHub Copilot. MCP (document tools) for all 8. Auto-detects installed agents."
            }
          },
          {
            "@type": "Question",
            "name": "How do hooks and MCP work together?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hooks inject context at session start automatically. MCP exposes tools (list, get, create, update) so agents can browse/edit .archcore/ docs during a session. Set up with archcore hooks install and archcore mcp install."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need any external services?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Standalone CLI binary. Everything in .archcore/ inside your repo — no servers, databases, accounts, or external dependencies. Install with curl -fsSL https://archcore.ai/install.sh | bash or go install."
            }
          },
          {
            "@type": "Question",
            "name": "What document types are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "10 types across three layers. Vision: PRD, Idea, Plan. Knowledge: ADR, RFC, Rule, Guide, Doc. Experience: Task Type, CPAT. Markdown with YAML frontmatter (title, status), parseable by both humans and AI."
            }
          },
          {
            "@type": "Question",
            "name": "How is this different from plain markdown?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Plain markdown lacks consistent structure for AI parsing. Archcore docs have typed YAML frontmatter, semantic categories, and validation via archcore validate and archcore doctor. MCP tools use this structure to deliver relevant context — not raw text dumps."
            }
          },
          {
            "@type": "Question",
            "name": "How do I keep the CLI updated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "archcore update self-updates to latest version. Cross-platform (macOS, Linux, Windows) on amd64/arm64. Run archcore doctor anytime to verify setup and check for issues."
            }
          }
        ]
      }
    </script>
